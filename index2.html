<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şebnem Ferah Fan Testi</title>
    <style>
        /* Pastel & Modern Rock Teması */
        :root { 
            --bg: #1a1a2e; 
            --card-bg: #2d2d44;
            --accent: #ff85a1; /* Pastel pembe */
            --text: #f0f0f0;
            --pastel-purple: #9d81ba;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text); 
            overflow: hidden; 
        }

        #app { 
            width: 100%; 
            max-width: 400px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        .screen { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.6s ease;
        }

        .active { display: flex; }

        /* Kart Konteynırı */
        #card-container { 
            position: relative; 
            width: 320px; 
            height: 450px; 
            margin-bottom: 30px;
        }

        .card { 
            position: absolute; 
            top: 0; left: 0;
            width: 100%; height: 100%; 
            background: var(--card-bg); 
            border-radius: 25px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-img { 
            position: absolute; 
            top:0; left:0; 
            width:100%; height:100%; 
            object-fit: cover; 
            opacity: 0.7; 
            z-index: 1;
        }

        .card-content { 
            z-index: 2; 
            text-align: left; 
            pointer-events: none;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            margin: -25px;
            padding: 25px;
        }

        .card h2 { font-size: 1.6rem; color: var(--accent); margin-bottom: 5px; }

        /* Butonlar */
        .btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 30px; 
            font-weight: bold;
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 133, 161, 0.4);
        }

        .btn:hover { transform: scale(1.05); background: var(--pastel-purple); }

        .controls { display: flex; gap: 30px; z-index: 10; }

        .btn-round { 
            width: 65px; height: 65px; 
            border-radius: 50%; border: none; 
            font-size: 24px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .btn-round:active { transform: scale(0.9); }

        /* Sonuç Ekranı */
        .result-img-container {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 5px solid var(--accent);
            padding: 5px;
            margin-bottom: 20px;
            background: var(--card-bg);
            overflow: hidden;
        }

        .result-img { 
            width: 100%; height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .swipe-left { transform: translateX(-600px) rotate(-40deg) !important; opacity: 0; }
        .swipe-right { transform: translateX(600px) rotate(40deg) !important; opacity: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="s-start" class="screen active">
        <h1 style="margin-bottom: 20px; color: var(--accent); text-align: center;">Nasıl Bir Şebnem Ferah Fanısın?</h1>
        <p style="margin-bottom: 30px; opacity: 0.8; text-align: center;">Gerçek rock ruhunu keşfetme zamanı.</p>
        <button class="btn" onclick="start()">Teste Başla</button>
    </div>

    <div id="s-quiz" class="screen">
        <div id="card-container"></div>
        <div class="controls">
            <button class="btn-round" style="background:#555" onclick="swipe('left')">⛔</button>
            <button class="btn-round" style="background:var(--accent)" onclick="swipe('right')">❤️</button>
        </div>
    </div>

    <div id="s-result" class="screen">
        <h2 style="color: var(--accent); margin-bottom: 10px;">Sonuç: En Güzel Şebnem Ferah Fanı</h2>
        <div class="result-img-container">
            <img src="eda.jpeg" class="result-img" id="final-img" onerror="this.src='https://via.placeholder.com/200?text=Eda'">
        </div>
        <p style="font-size: 1.2rem; margin-bottom: 25px;">Gerçek rock ruhu sensin.</p>
        <button class="btn" onclick="location.reload()">Tekrarla</button>
    </div>
</div>

<script>
    // Dosya isimleri s1, s2... ve 1.jfif, 2.jpg... olarak güncellendi
    const data = [
        { t: "Sil Baştan", s: "s1.mp3", i: "1.jfif" },
        { t: "Can Kırıkları", s: "s2.mp3", i: "2.jpg" },
        { t: "Hoşçakal", s: "s3.mp3", i: "3.jpg" },
        { t: "Mayın Tarlası", s: "s4.mp3", i: "4.jpg" },
        { t: "Sigara", s: "s5.mp3", i: "5.jpg" },
        { t: "Utangaç", s: "s6.mp3", i: "6.png" }
    ];

    let idx = 0;
    let audio = new Audio();

    function start() {
        document.getElementById('s-start').classList.remove('active');
        document.getElementById('s-quiz').classList.add('active');
        render();
        play(0);
    }

    function render() {
        const cont = document.getElementById('card-container');
        cont.innerHTML = '';
        data.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.zIndex = data.length - i;
            card.id = 'c-' + i;
            card.innerHTML = `
                <img src="${item.i}" class="card-img" onerror="this.src='https://via.placeholder.com/320x450/2d2d44/ff85a1?text=${item.t}'">
                <div class="card-content"><h2>${item.t}</h2></div>
            `;
            cont.appendChild(card);
        });
    }

    function play(n) {
        audio.pause();
        // n=99 sonucu (eda.mp3) çalar
        if(n === 99 || n >= data.length) {
            audio.src = "seda.mp3";
        } else {
            audio.src = data[n].s;
        }
        audio.play().catch(e => console.log("Dosya bulunamadı veya oynatma engellendi."));
    }

    function swipe(dir) {
        const currentCard = document.getElementById('c-' + idx);
        if (currentCard) {
            currentCard.classList.add(dir === 'left' ? 'swipe-left' : 'swipe-right');
            idx++;
            
            if (idx < data.length) {
                play(idx);
            } else {
                setTimeout(showResult, 400);
            }
        }
    }

    function showResult() {
        document.getElementById('s-quiz').classList.remove('active');
        document.getElementById('s-result').classList.add('active');
        play(99); 
    }
</script>
</body>
</html>
