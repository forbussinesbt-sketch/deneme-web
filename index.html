<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangi Şebnem Ferah Fanısın?</title>
    <style>
        :root {
            --primary-dark: #0f0c29;
            --mid-purple: #302b63;
            --accent-pink: #ff0055;
            --text-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark), var(--mid-purple), #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-white);
            overflow: hidden;
            touch-action: none;
        }

        /* Container */
        #app {
            width: 100%;
            max-width: 400px;
            height: 600px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: flex;
        }

        /* Start Screen */
        h1 { font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 10px var(--accent-pink); }
        p { opacity: 0.8; margin-bottom: 30px; }

        .btn {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        /* Card Stack */
        #card-container {
            position: relative;
            width: 100%;
            height: 450px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, opacity 0.3s;
            cursor: grab;
            overflow: hidden;
            user-select: none;
        }

        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        .card h2 { font-size: 1.8rem; margin-bottom: 5px; }
        .card i { font-style: italic; opacity: 0.9; display: block; margin-bottom: 20px;}

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            z-index: 10;
        }

        .btn-round {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-pass { background: #444; }
        .btn-like { background: var(--accent-pink); }

        /* Result Screen */
        .result-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #333;
            margin: 20px 0;
            border: 5px solid var(--accent-pink);
            object-fit: cover;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Swipe Classes */
        .swiped-left { transform: translateX(-1000px) rotate(-30deg) !important; opacity: 0; }
        .swiped-right { transform: translateX(1000px) rotate(30deg) !important; opacity: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <h1>Hangi Şebnem Ferah Fanısın?</h1>
        <p>Kaydır ve öğren</p>
        <button class="btn" onclick="startQuiz()">Teste Başla</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="card-container"></div>
        <div class="controls">
            <button class="btn-round btn-pass" onclick="handleSwipe('left')">⛔</button>
            <button class="btn-round btn-like" onclick="handleSwipe('right')">❤️</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>Sonuç: En Güzel Şebnem Ferah Fanı</h1>
        <img src="https://via.placeholder.com/200" alt="special person" class="result-img">
        <p style="font-size: 1.2rem; font-weight: bold;">Gerçek rock ruhu sensin.</p>
        <button class="btn" onclick="location.reload()">Tekrar Oyna</button>
    </div>
</div>

<script>
    const songs = [
        { title: "Sil Baştan", lyric: "Gücün var mı hiç baştan başlamaya?", color: "#4b0082", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { title: "Can Kırıkları", lyric: "Kalbim can kırıklarıyla dolu...", color: "#2e0854", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { title: "Yalnız", lyric: "Yalnız kaldım dünyada...", color: "#1a0033", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
        { title: "Ben Bir Mülteciyim", lyric: "Sana sığındım her gece...", color: "#483d8b", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
        { title: "Bu Aşk Fazla Sana", lyric: "Gidiyorum bütün aşklar yüreğimde.", color: "#800080", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" },
        { title: "Fırtına", lyric: "Koptu içimde sessiz bir fırtına.", color: "#4b0082", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" },
        { title: "Hoşçakal", lyric: "Gidiyorum, hoşçakal...", color: "#191970", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3" }
    ];

    let currentIndex = 0;
    let currentAudio = new Audio();
    const container = document.getElementById('card-container');

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        loadCards();
        playSong(0);
    }

    function loadCards() {
        songs.forEach((song, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.zIndex = songs.length - index;
            card.innerHTML = `
                <div class="card-bg" style="background-color: ${song.color}"></div>
                <div class="card-content">
                    <h2>${song.title}</h2>
                    <i>"${song.lyric}"</i>
                </div>
            `;
            setupSwipe(card);
            container.appendChild(card);
        });
    }

    function playSong(index) {
        currentAudio.pause();
        if (index < songs.length) {
            currentAudio.src = songs[index].audio;
            currentAudio.play().catch(e => console.log("Audio play blocked by browser. Interaction required."));
        }
    }

    function handleSwipe(direction) {
        const cards = document.querySelectorAll('.card');
        const topCard = cards[currentIndex];
        
        if (topCard) {
            topCard.classList.add(direction === 'left' ? 'swiped-left' : 'swiped-right');
            currentIndex++;
            
            if (currentIndex < songs.length) {
                playSong(currentIndex);
            } else {
                currentAudio.pause();
                setTimeout(showResult, 500);
            }
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
    }

    // Touch/Mouse Swipe Implementation
    function setupSwipe(card) {
        let startX = 0;
        let currentX = 0;

        const start = (e) => {
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            card.style.transition = 'none';
        };

        const move = (e) => {
            if (!startX) return;
            currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const diff = currentX - startX;
            const rotation = diff / 10;
            card.style.transform = `translateX(${diff}px) rotate(${rotation}deg)`;
        };

        const end = () => {
            const diff = currentX - startX;
            card.style.transition = 'transform 0.3s ease, opacity 0.3s';
            
            if (Math.abs(diff) > 100) {
                handleSwipe(diff > 0 ? 'right' : 'left');
            } else {
                card.style.transform = '';
            }
            startX = 0;
            currentX = 0;
        };

        card.addEventListener('mousedown', start);
        card.addEventListener('touchstart', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);
    }
</script>

</body>
</html>
