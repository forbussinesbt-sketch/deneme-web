<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şebnem Ferah // Fan Testi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0033;
            --bg: #050505;
            --card-inner: #111;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Minimalist Başlık */
        header {
            position: absolute;
            top: 40px;
            text-align: center;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        header h1 { font-size: 1.2rem; font-weight: 700; margin: 0; color: var(--accent); }
        header p { font-size: 0.7rem; opacity: 0.5; margin-top: 5px; }

        /* Kart Alanı */
        .stage {
            position: relative;
            width: 320px;
            height: 480px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            inset: 0;
            background: var(--card-inner);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            cursor: grab;
            transition: transform 0.1s ease-out, opacity 0.3s ease;
            user-select: none;
            touch-action: none;
        }

        .card img {
            width: 100%;
            height: 70%;
            object-fit: cover;
            filter: grayscale(40%) contrast(1.1);
            pointer-events: none;
        }

        .card-info {
            padding: 25px;
            background: linear-gradient(to top, #111 80%, transparent);
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-info h2 {
            font-size: 1.4rem;
            font-weight: 300;
            margin: 0;
            text-align: center;
        }

        /* Final Ekranı */
        #result {
            display: none;
            text-align: center;
            max-width: 320px;
            animation: fadeIn 0.8s ease forwards;
        }

        #result img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--accent);
        }

        #result h2 { font-size: 2rem; margin-bottom: 10px; }
        #result p { line-height: 1.6; opacity: 0.8; font-weight: 300; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Göstergeler */
        .hint-bar {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 60px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.3;
        }
    </style>
</head>
<body>

<header>
    <h1>Şebnem Ferah</h1>
    <p>Swipe to Test Your Soul</p>
</header>

<div class="stage" id="stage">
    </div>

<div class="hint-bar" id="hint-bar">
    <span>← Bilmiyorum</span>
    <span>Biliyorum →</span>
</div>

<div id="result">
    <img id="final-img" src="" alt="Şebnem Ferah">
    <h2 id="final-percent">%0</h2>
    <p id="final-text"></p>
    <button onclick="location.reload()" style="background: none; border: 1px solid white; color: white; padding: 10px 20px; margin-top: 20px; cursor: pointer; border-radius: 5px;">Tekrar Başla</button>
</div>

<audio id="audio-player"></audio>

<script>
    const songs = [
        { t: "Vicdan", mp3: "URL_BURAYA", img: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=500" },
        { t: "Sigara", mp3: "URL_BURAYA", img: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=500" },
        { t: "Sil Baştan", mp3: "URL_BURAYA", img: "https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=500" }
    ];

    let currentIdx = songs.length - 1;
    let score = 0;
    const stage = document.getElementById('stage');
    const player = document.getElementById('audio-player');

    function createCards() {
        songs.forEach((song, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.zIndex = i;
            card.innerHTML = `
                <img src="${song.img}" alt="Şebnem Ferah">
                <div class="card-info"><h2>${song.t}</h2></div>
            `;
            stage.appendChild(card);
            initDrag(card);
        });
        playSong();
    }

    function playSong() {
        if(currentIdx >= 0) {
            player.src = songs[currentIdx].mp3;
            player.play().catch(() => console.log("Etkileşim bekleniyor..."));
        }
    }

    function initDrag(card) {
        let startX, moveX;
        
        card.addEventListener('pointerdown', e => {
            startX = e.clientX;
            card.style.transition = 'none';
        });

        window.addEventListener('pointermove', e => {
            if (!startX) return;
            moveX = e.clientX - startX;
            let rotation = moveX / 10;
            card.style.transform = `translateX(${moveX}px) rotate(${rotation}deg)`;
        });

        window.addEventListener('pointerup', () => {
            if (!startX) return;
            if (Math.abs(moveX) > 120) {
                completeSwipe(moveX > 0 ? 'right' : 'left', card);
            } else {
                card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.transform = 'translateX(0) rotate(0)';
            }
            startX = null;
            moveX = 0;
        });
    }

    function completeSwipe(dir, card) {
        if(dir === 'right') score++;
        card.style.transition = 'transform 0.5s ease-in, opacity 0.3s';
        card.style.transform = `translateX(${dir === 'right' ? 1000 : -1000}px) rotate(${dir === 'right' ? 45 : -45}deg)`;
        card.style.opacity = '0';
        
        currentIdx--;
        setTimeout(() => {
            card.remove();
            if(currentIdx < 0) showFinal();
            else playSong();
        }, 300);
    }

    function showFinal() {
        document.getElementById('hint-bar').style.display = 'none';
        stage.style.display = 'none';
        const res = document.getElementById('result');
        const perc = Math.round((score / songs.length) * 100);
        
        res.style.display = 'block';
        document.getElementById('final-img').src = "https://i.ibb.co/Xf8z19q/sebnem-ferah.jpg"; // Buraya o güzel hanımefendi gelecek
        document.getElementById('final-percent').innerText = `%${perc} Şebnem Ferah Ruhu`;
        document.getElementById('final-text').innerHTML = `Sonuç ne olursa olsun ölçemeyiz... Ama <b>en güzeli görseldeki hanımefendi</b> (yani sen) olduğu kesin! 🤘`;
        player.pause();
    }

    createCards();
</script>

</body>
</html>
